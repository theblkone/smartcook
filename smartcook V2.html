<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCook ERP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F7FE;
    --card: #ffffff;
    --sidebar: #0f172a;
    --sidebar-hover: #1e293b;
    --accent: #3b82f6;
    --accent-dark: #2563eb;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f97316;
    --amber: #f59e0b;
    --text: #1e293b;
    --muted: #94a3b8;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }
  .card { background: var(--card); border-radius: 1.5rem; border: 1px solid var(--border); box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: #dc2626; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover { background: #ea580c; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }
  .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; border-radius: 0.5rem; }
  input, select, textarea { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; }
  .input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--border); border-radius: 0.75rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .input:focus { border-color: var(--accent); background: white; }
  .label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; display: block; }
  .th { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0.75rem 1rem; text-align: left; }
  .td { padding: 0.875rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
  tr:last-child .td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; }
  .badge-blue { background: #dbeafe; color: #1d4ed8; }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-orange { background: #ffedd5; color: #9a3412; }
  .badge-amber { background: #fef3c7; color: #92400e; }
  .badge-gray { background: #f1f5f9; color: #475569; }
  .kpi-card { background: white; border-radius: 1.25rem; border: 1px solid var(--border); padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.875rem; color: #94a3b8; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-bottom: 0.25rem; }
  .sidebar-link:hover { background: var(--sidebar-hover); color: white; }
  .sidebar-link.active { background: var(--accent); color: white; }
  .sidebar-link svg { flex-shrink: 0; }
  #sidebar { width: 240px; min-width: 240px; background: var(--sidebar); display: flex; flex-direction: column; padding: 1.25rem; height: 100vh; overflow-y: auto; }
  #main { flex: 1; overflow-y: auto; padding: 1.75rem; height: 100vh; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; border-radius: 1.5rem; padding: 2rem; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.15); }
  .modal-lg { max-width: 760px; }
  .pos-item { background: white; border-radius: 1.25rem; border: 1px solid var(--border); padding: 1rem; cursor: pointer; transition: all 0.15s; }
  .pos-item:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(59,130,246,0.12); transform: translateY(-2px); }
  .pos-item.disabled { opacity: 0.4; pointer-events: none; }
  .pin-btn { width: 60px; height: 60px; border-radius: 1rem; background: #f1f5f9; border: none; font-size: 1.25rem; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--text); }
  .pin-btn:hover { background: var(--accent); color: white; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .page-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .scroll-table { overflow-x: auto; }
  .strikethrough { text-decoration: line-through; color: var(--muted); }
  .promo-price { color: var(--red); font-weight: 700; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 9999px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="text-align:center;width:100%;max-width:420px;padding:2rem;">
    <div style="margin-bottom:2rem;">
      <div style="width:72px;height:72px;background:var(--accent);border-radius:1.5rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 30px rgba(59,130,246,0.4);">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="white" opacity="0.3"/><path d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 9.14v-.01c-.97-.97-2.33-1.53-3.77-1.53C3.52 7.6 1 10.13 1 13.3c0 3.17 2.5 5.7 5.61 5.7H12h5.39C20.5 19 23 16.47 23 13.3c0-3.17-2.52-5.68-4.4-6.68z" fill="white"/></svg>
      </div>
      <h1 style="color:white;font-size:2rem;font-weight:800;letter-spacing:-0.03em;">SmartCook</h1>
      <p style="color:#64748b;margin-top:0.5rem;">Sistema ERP Gastronômico</p>
    </div>
    <div class="card" style="padding:2rem;border-radius:1.5rem;">
      <div id="loginStep1" style="text-align:center;padding:0.5rem 0;">
        <div style="width:48px;height:48px;border:3px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
        <p style="font-weight:600;font-size:0.95rem;margin-bottom:0.25rem;">Conectando ao Supabase...</p>
        <p id="sbConnectError" style="color:var(--red);font-size:0.78rem;margin-top:0.75rem;min-height:1.2rem;"></p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
      <div id="loginStep2" style="display:none;">
        <p style="font-weight:700;font-size:1rem;margin-bottom:0.25rem;">Digite seu PIN</p>
        <p style="font-size:0.8rem;color:var(--muted);margin-bottom:1.5rem;">Insira o PIN de 4 dígitos</p>
        <div style="display:flex;gap:0.5rem;justify-content:center;margin-bottom:1.25rem;">
          <div id="pin0" style="width:14px;height:14px;border-radius:50%;background:#e2e8f0;"></div>
          <div id="pin1" style="width:14px;height:14px;border-radius:50%;background:#e2e8f0;"></div>
          <div id="pin2" style="width:14px;height:14px;border-radius:50%;background:#e2e8f0;"></div>
          <div id="pin3" style="width:14px;height:14px;border-radius:50%;background:#e2e8f0;"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:0.5rem;">
          <button class="pin-btn" onclick="pinPress(1)">1</button>
          <button class="pin-btn" onclick="pinPress(2)">2</button>
          <button class="pin-btn" onclick="pinPress(3)">3</button>
          <button class="pin-btn" onclick="pinPress(4)">4</button>
          <button class="pin-btn" onclick="pinPress(5)">5</button>
          <button class="pin-btn" onclick="pinPress(6)">6</button>
          <button class="pin-btn" onclick="pinPress(7)">7</button>
          <button class="pin-btn" onclick="pinPress(8)">8</button>
          <button class="pin-btn" onclick="pinPress(9)">9</button>
          <button class="pin-btn" onclick="pinPress('clear')" style="font-size:0.9rem;">✕</button>
          <button class="pin-btn" onclick="pinPress(0)">0</button>
          <button class="pin-btn" onclick="pinPress('del')" style="font-size:0.9rem;">⌫</button>
        </div>
        <p id="pinError" style="color:var(--red);font-size:0.8rem;text-align:center;height:1.2rem;"></p>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;height:100vh;display:none;flex-direction:row;">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;padding:0.25rem 0;">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:0.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 9.14v-.01c-.97-.97-2.33-1.53-3.77-1.53C3.52 7.6 1 10.13 1 13.3c0 3.17 2.5 5.7 5.61 5.7H12h5.39C20.5 19 23 16.47 23 13.3c0-3.17-2.52-5.68-4.4-6.68z"/></svg>
      </div>
      <div>
        <p style="color:white;font-weight:800;font-size:0.95rem;line-height:1.2;">SmartCook</p>
        <p style="color:#475569;font-size:0.7rem;">ERP Gastronômico</p>
      </div>
    </div>
    <div id="sidebarNav"></div>
    <div style="margin-top:auto;padding-top:1rem;border-top:1px solid #1e293b;">
      <div id="sidebarUser" style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0.5rem;border-radius:0.875rem;">
        <div id="sidebarAvatar" style="width:36px;height:36px;border-radius:0.75rem;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;flex-shrink:0;background:var(--accent);color:white;"></div>
        <div style="min-width:0;">
          <p id="sidebarName" style="color:white;font-weight:600;font-size:0.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></p>
          <p id="sidebarRole" style="color:#475569;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;"></p>
        </div>
      </div>
      <div id="sidebarDbBtn"></div>
      <button onclick="logout()" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:0.5rem;color:#64748b;border-color:#1e293b;font-size:0.8rem;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sair
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">
    <div id="pageContent"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay" style="display:none;">
  <div id="modalContent" class="modal"></div>
</div>

<script>
// ======================= STATE =======================
let state = {
  inventory: [],
  recipes: [],
  productionLog: [],
  salesLog: [],
  users: [],
  promotions: [],
  auditLog: []
};
let currentUser = null;
let currentPage = 'dashboard';
let pinBuffer = '';

// ======================= SUPABASE CONFIG =======================
const SB_URL = 'https://jmunzzpodqiamwcejqcw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptdW56enBvZHFpYW13Y2VqcWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjU3MjUsImV4cCI6MjA5MjkwMTcyNX0.rCJ3n-qBsOAmRzR-7U-o6RDM-HS182wmnyRp0ifWfbY';
let SB_ONLINE = false;  // true when connected to Supabase

function sbHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Prefer': 'return=representation'
  };
}

async function sbGet(table, params = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: sbHeaders() });
  if (!r.ok) throw new Error(`GET ${table} ${r.status}: ${await r.text()}`);
  return r.json();
}
async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST', headers: sbHeaders(), body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`POST ${table} ${r.status}: ${await r.text()}`);
  return r.json();
}
async function sbPatch(table, id, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH', headers: sbHeaders(), body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`PATCH ${table} ${r.status}: ${await r.text()}`);
  return r.json();
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE', headers: sbHeaders()
  });
  if (!r.ok) throw new Error(`DELETE ${table} ${r.status}: ${await r.text()}`);
}

// Map Supabase rows → local state shape
function mapUser(r)   { return { id: r.id, name: r.name, pin: r.pin, role: r.role }; }
function mapInv(r)    { return { id: r.id, name: r.name, category: r.category, unit: r.unit, stock: parseFloat(r.stock||0), minStock: parseFloat(r.min_stock||0), unitPrice: parseFloat(r.unit_price||0), type: r.type }; }
function mapRecipe(r, allIngs) {
  const ings = (allIngs || []).filter(i => i.recipe_id === r.id)
    .map(i => ({ itemId: i.item_id, qty: parseFloat(i.qty), group: i.ing_group }));
  return { id: r.id, name: r.name, type: r.type, salePrice: parseFloat(r.sale_price||0), ingredients: JSON.stringify(ings) };
}
function mapLot(r)    { return { id: r.id, recipeId: r.recipe_id, recipeName: r.recipe_name, qty: parseFloat(r.qty), remaining: parseFloat(r.remaining), date: r.produced_at, expiresAt: r.expires_at, status: r.status, producedBy: r.produced_by }; }
function mapSale(r, items) {
  const its = (items || []).filter(i => i.sale_id === r.id).map(i => ({ name: i.recipe_name, qty: parseFloat(i.qty), price: parseFloat(i.unit_price) }));
  return { id: r.id, date: r.sold_at, user: r.sold_by, items: JSON.stringify(its), subtotal: parseFloat(r.subtotal), discount: parseFloat(r.discount), total: parseFloat(r.total), payment: r.payment };
}
function mapPromo(r)  { return { id: r.id, name: r.name, type: r.type, value: parseFloat(r.value), productId: r.product_id||'', minQty: parseInt(r.min_qty||1), dateFrom: r.date_from, dateTo: r.date_to, active: r.active }; }

// Load all state from Supabase
async function loadFromSupabase() {
  const [users, inv, recipes, ings, lots, sales, saleItems, promos, audit] = await Promise.all([
    sbGet('sc_users', 'active=eq.true&order=name'),
    sbGet('sc_inventory', 'active=eq.true&order=name'),
    sbGet('sc_recipes', 'active=eq.true&order=name'),
    sbGet('sc_recipe_ingredients', 'select=*'),
    sbGet('sc_production_log', 'order=produced_at.desc&limit=500'),
    sbGet('sc_sales_log', 'order=sold_at.desc&limit=200'),
    sbGet('sc_sale_items', 'select=*'),
    sbGet('sc_promotions', 'order=date_from.desc'),
    sbGet('sc_audit_log', 'order=created_at.desc&limit=200'),
  ]);
  state.users       = users.map(mapUser);
  state.inventory   = inv.map(mapInv);
  state.recipes     = recipes.map(r => mapRecipe(r, ings));
  state.productionLog = lots.map(mapLot);
  state.salesLog    = sales.map(r => mapSale(r, saleItems));
  state.promotions  = promos.map(mapPromo);
  state.auditLog    = audit.map(r => ({ date: r.created_at, user: r.user_name, action: r.action, module: r.module, detail: r.detail }));
  saveToLocal(); // mirror to localStorage as cache
}

// ======================= INIT =======================
window.onload = async function() {
  loadFromLocal();
  // Always try Supabase on load — credentials are hardcoded
  try {
    await loadFromSupabase();
    SB_ONLINE = true;
    showLoginStep2();
  } catch(e) {
    SB_ONLINE = false;
    console.warn('Supabase unavailable, using localStorage cache:', e);
    const errEl = document.getElementById('sbConnectError');
    if (errEl) errEl.textContent = 'Sin conexión — usando datos locales.';
    showLoginStep2();
  }
};

function showLoadingOverlay(msg) {
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;backdrop-filter:blur(4px);';
    document.body.appendChild(el);
  }
  el.innerHTML = `<div style="width:48px;height:48px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem;"></div>
    <p style="color:white;font-weight:600;font-size:0.95rem;">${msg}</p>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  el.style.display = 'flex';
}
function hideLoadingOverlay() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = 'none';
}

function showLoginStep2() {
  if (state.users.length > 0) {
    document.getElementById('loginStep1').style.display = 'none';
    document.getElementById('loginStep2').style.display = 'block';
  }
}

// ======================= LOGIN =======================
// connectSupabase() removed — credentials are hardcoded

function loadMockData() {
  SB_ONLINE = false;
  forceMockData();
  showLoginStep2();
}

function showDbConfigModal() {
  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:1.25rem;">Estado da Conexão</h2>
    <div style="padding:1rem;background:var(--bg);border-radius:1rem;margin-bottom:1rem;">
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
        <div style="width:10px;height:10px;border-radius:50%;background:${SB_ONLINE?'var(--green)':'var(--orange)'};box-shadow:0 0 0 3px ${SB_ONLINE?'#d1fae5':'#ffedd5'};"></div>
        <span style="font-weight:700;font-size:0.9rem;">${SB_ONLINE?'Supabase Conectado':'Modo Offline (cache local)'}</span>
      </div>
      <p style="font-size:0.78rem;color:var(--muted);word-break:break-all;">🔗 ${SB_URL}</p>
    </div>
    <p id="modal_sb_error" style="color:var(--red);font-size:0.78rem;min-height:1.2rem;"></p>
    <div style="display:flex;gap:0.75rem;margin-top:0.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-primary" onclick="reconnectDB()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 013.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sincronizar
      </button>
    </div>`);
}

async function reconnectDB() {
  const errEl = document.getElementById('modal_sb_error');
  if (errEl) errEl.textContent = '';
  showLoadingOverlay('Sincronizando com Supabase...');
  try {
    await loadFromSupabase();
    SB_ONLINE = true;
    hideLoadingOverlay();
    closeModal();
    initApp();
    showToast('✓ Dados sincronizados com Supabase!');
    addAudit('Sincronização DB', 'Sistema', `Dados recarregados por ${currentUser?.name}.`);
  } catch(e) {
    hideLoadingOverlay();
    SB_ONLINE = false;
    if (errEl) errEl.textContent = 'Erro: ' + (e.message || 'Falha na conexão.');
    else showToast('Erro ao sincronizar: ' + e.message);
  }
}

function pinPress(val) {
  if (val === 'clear') { pinBuffer = ''; }
  else if (val === 'del') { pinBuffer = pinBuffer.slice(0, -1); }
  else if (pinBuffer.length < 4) { pinBuffer += val; }
  updatePinDots();
  if (pinBuffer.length === 4) attemptLogin();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pin' + i);
    dot.style.background = i < pinBuffer.length ? 'var(--accent)' : '#e2e8f0';
  }
}

function attemptLogin() {
  const user = state.users.find(u => String(u.pin) === pinBuffer);
  if (user) {
    currentUser = user;
    pinBuffer = '';
    updatePinDots();
    document.getElementById('loginScreen').style.display = 'none';
    const appEl = document.getElementById('app');
    appEl.style.display = 'flex';
    initApp();
    addAudit('Login', 'Acesso', `Usuário ${user.name} (${user.role}) logou.`);
  } else {
    document.getElementById('pinError').textContent = 'PIN incorreto. Tente novamente.';
    setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 2000);
    pinBuffer = '';
    updatePinDots();
  }
}

function logout() {
  addAudit('Logout', 'Acesso', `Usuário ${currentUser.name} saiu.`);
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  pinBuffer = '';
  updatePinDots();
}

async function sbSaveInventoryItem(item) {
  if (!SB_ONLINE) return;
  try {
    const body = { name: item.name, category: item.category, unit: item.unit,
      stock: item.stock, min_stock: item.minStock, unit_price: item.unitPrice, type: item.type };
    const existing = await sbGet('sc_inventory', `id=eq.${item.id}`);
    if (existing.length) await sbPatch('sc_inventory', item.id, body);
    else await sbPost('sc_inventory', { id: item.id, ...body });
  } catch(e) { console.error('sbSaveInventoryItem', e); }
}

}

async function sbSaveRecipe(recipe) {
  if (!SB_ONLINE) return;
  try {
    const body = { name: recipe.name, type: recipe.type, sale_price: recipe.salePrice };
    const existing = await sbGet('sc_recipes', `id=eq.${recipe.id}`);
    if (existing.length) {
      await sbPatch('sc_recipes', recipe.id, body);
      // delete old ingredients and re-insert
      await fetch(`${SB_URL}/rest/v1/sc_recipe_ingredients?recipe_id=eq.${recipe.id}`, { method: 'DELETE', headers: sbHeaders() });
    } else {
      await sbPost('sc_recipes', { id: recipe.id, ...body });
    }
    const ings = JSON.parse(recipe.ingredients || '[]');
    if (ings.length) {
      const rows = ings.map(i => ({ recipe_id: recipe.id, item_id: i.itemId, qty: i.qty, ing_group: i.group }));
      await sbPost('sc_recipe_ingredients', rows);
    }
  } catch(e) { console.error('sbSaveRecipe', e); }
}

    else await sbPost('sc_production_log', { id: lot.id, ...body });

async function sbSaveSale(sale, cartItems) {
  if (!SB_ONLINE) return;
  try {
    const saleRow = { id: sale.id, sold_by: sale.user, subtotal: sale.subtotal,
      discount: sale.discount, total: sale.total, payment: sale.payment, sold_at: sale.date };
    await sbPost('sc_sales_log', saleRow);
    const itemRows = cartItems.map(c => ({
      sale_id: sale.id, recipe_id: c.recipeId, recipe_name: c.name,
      qty: c.qty, unit_price: c.basePrice,
      line_total: c._finalLineTotal !== undefined ? c._finalLineTotal : c.basePrice * c.qty
    }));
    if (itemRows.length) await sbPost('sc_sale_items', itemRows);
    // Sync lot remainings after FIFO deduction
    const touchedLotIds = [...new Set(cartItems.map(c => c.recipeId).flatMap(rid =>
      state.productionLog.filter(l => l.recipeId === rid).map(l => l.id)
    ))];
    for (const lid of touchedLotIds) {
      const lot = state.productionLog.find(l => l.id === lid);
      if (lot) await sbPatch('sc_production_log', lid, { remaining: lot.remaining });
    }
  } catch(e) { console.error('sbSaveSale', e); }
}

// ======================= HELPERS =======================
function fmt(n) { return 'R$ ' + (parseFloat(n)||0).toFixed(2).replace('.',','); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('pt-BR') : '-'; }
function fmtDT(d) { return d ? new Date(d).toLocaleString('pt-BR') : '-'; }
function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2,9); }
function daysLeft(d) { if (!d) return 9999; return Math.ceil((new Date(d)-new Date())/(86400000)); }

function getActiveLotsForRecipe(recipeId) {
  return state.productionLog.filter(l => l.recipeId === recipeId && l.status === 'active' && parseFloat(l.remaining) > 0);
}
function getTotalStock(recipeId) {
  return getActiveLotsForRecipe(recipeId).reduce((s,l) => s + parseFloat(l.remaining), 0);
}
function getInvItem(id) { return state.inventory.find(i => i.id === id); }
function getSemiLots(inv) {
  // Returns active lots that correspond to a semi-elaborado inventory item.
  // Matches by: recipeId of any recipe whose name === inv.name,
  // OR directly by recipeName === inv.name (covers data from older saves).
  const matchingRecipeIds = state.recipes
    .filter(r => r.type === 'semi' && r.name === inv.name)
    .map(r => r.id);
  return state.productionLog.filter(l =>
    l.status === 'active' &&
    parseFloat(l.remaining) > 0 &&
    (matchingRecipeIds.includes(l.recipeId) || l.recipeName === inv.name)
  );
}
function getEffectiveStock(inv) {
  if (!inv) return 0;
  if (String(inv.type) === 'semi') {
    return getSemiLots(inv).reduce((s, l) => s + parseFloat(l.remaining), 0);
  }
  return parseFloat(inv.stock) || 0;
}
// Consume stock: for semi-elaborados deducts from lots (FIFO), for regular deducts from inv.stock
function consumeStock(inv, amount) {
  if (String(inv.type) === 'semi') {
    let remaining = amount;
    const lots = getSemiLots(inv).sort((a, b) => new Date(a.date) - new Date(b.date));
    for (const lot of lots) {
      if (remaining <= 0) break;
      const deduct = Math.min(parseFloat(lot.remaining), remaining);
      lot.remaining = parseFloat((parseFloat(lot.remaining) - deduct).toFixed(3));
      remaining -= deduct;
    }
  } else {
    inv.stock = parseFloat((parseFloat(inv.stock) - amount).toFixed(3));
  }
}
function getRecipe(id) { return state.recipes.find(r => r.id === id); }
function calcRecipeCost(recipe) {
  let cost = 0;
  const ingredients = JSON.parse(recipe.ingredients || '[]');
  ingredients.forEach(ing => {
    const inv = getInvItem(ing.itemId);
    if (inv) cost += (parseFloat(ing.qty) * parseFloat(inv.unitPrice));
  });
  return cost;
}

  const cogs = (() => {
    let c = 0;
    state.salesLog.forEach(sl => {
      const items = JSON.parse(sl.items || '[]');
      items.forEach(item => {
        const rec = state.recipes.find(r => r.name === item.name);
        if (rec) c += calcRecipeCost(rec) * parseFloat(item.qty||1);
      });
    });
    return c;
  })();
  const grossProfit = totalRevenue - cogs;
  const invValue = state.inventory.reduce((s,i) => s + parseFloat(i.stock||0)*parseFloat(i.unitPrice||0), 0);

  const byCat = {};
  state.inventory.forEach(i => {
    if (!byCat[i.category]) byCat[i.category] = 0;
    byCat[i.category] += parseFloat(i.stock||0)*parseFloat(i.unitPrice||0);
  });

  document.getElementById('pageContent').innerHTML = `
    <div class="section-header"><h1 class="page-title">Financeiro</h1></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;">
      ${kpiCard('Receita Total','💵',fmt(totalRevenue),'badge-green','')}
      ${kpiCard('Descontos Dados','🏷️',fmt(totalDiscount),'badge-orange','')}
      ${kpiCard('COGS (Custo Prod.)','📉',fmt(cogs),'badge-red','')}
      ${kpiCard('Lucro Bruto','📈',fmt(grossProfit),'badge-green','')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
      <div class="card" style="padding:1.5rem;">
        <h3 style="font-weight:700;font-size:0.95rem;margin-bottom:1rem;">💰 Valor do Inventário: <span style="color:var(--green);">${fmt(invValue)}</span></h3>
        <table style="width:100%;"><thead><tr><th class="th">Categoria</th><th class="th">Valor</th></tr></thead><tbody>
          ${Object.entries(byCat).map(([cat,val])=>`<tr><td class="td">${cat}</td><td class="td mono" style="font-weight:600;">${fmt(val)}</td></tr>`).join('')}
        </tbody></table>
      </div>
      <div class="card" style="padding:1.5rem;">
        <h3 style="font-weight:700;font-size:0.95rem;margin-bottom:1rem;">📊 Últimas Vendas</h3>
        <table style="width:100%;"><thead><tr><th class="th">Data</th><th class="th">Total</th><th class="th">Pagamento</th></tr></thead><tbody>
          ${state.salesLog.slice(0,10).map(sl=>`<tr><td class="td" style="font-size:0.8rem;">${fmtDT(sl.date)}</td><td class="td mono" style="font-weight:600;color:var(--green);">${fmt(sl.total)}</td><td class="td"><span class="badge badge-blue">${sl.payment}</span></td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>
  `;
}

      <button class="btn btn-primary" onclick="openInvModal()">+ Novo Item</button>

      <div style="margin-bottom:1rem;display:flex;gap:0.75rem;">

          const displayStock = semiRecipe
            ? state.productionLog.filter(l=>l.recipeId===semiRecipe.id&&l.status==='active'&&parseFloat(l.remaining)>0).reduce((s,l)=>s+parseFloat(l.remaining),0)

            <td class="td"><span class="badge ${i.type==='semi'?'badge-amber':'badge-gray'}">${i.type==='semi'?'Semi-elab.':'Regular'}</span></td>
            <td class="td"><span class="badge ${critical?'badge-red':'badge-green'}">${displayStock.toFixed(2)} ${i.unit}</span>${i.type==='semi'?'<span style="font-size:0.68rem;color:var(--muted);margin-left:0.4rem;">(lotes ativos)</span>':''}</td>
            <td class="td" style="color:var(--muted);">${i.minStock} ${i.unit}</td>
            <td class="td mono">${fmt(i.unitPrice)}</td>
            <td class="td mono" style="font-weight:600;">${fmt(displayStock*parseFloat(i.unitPrice))}</td>
            <td class="td" style="display:flex;gap:0.5rem;align-items:center;">
              ${i.type==='semi'

                    <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Gerido pela Produção

                   <button class="btn btn-ghost btn-sm" onclick='openInvModal(${JSON.stringify(i)})'>✏️</button>

            </td>
          </tr>`;

function openInvModal(item=null) {

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <div style="grid-column:1/-1;"><label class="label">Nome</label><input class="input" id="mi_name" value="${isEdit?item.name:''}"></div>
      <div><label class="label">Categoria</label><input class="input" id="mi_cat" value="${isEdit?item.category:''}"></div>
      <div><label class="label">Unidade</label><select class="input" id="mi_unit">
        ${['kg','u','l','cx','g','ml'].map(u=>`<option${(isEdit&&item.unit===u)?' selected':''}>${u}</option>`).join('')}
      </select></div>
      <div><label class="label">Stock Atual</label><input class="input" type="number" id="mi_stock" value="${isEdit?item.stock:0}" step="0.01"></div>
      <div><label class="label">Stock Mínimo</label><input class="input" type="number" id="mi_minstock" value="${isEdit?item.minStock:0}" step="0.01"></div>
      <div><label class="label">Preço Unitário (R$)</label><input class="input" type="number" id="mi_price" value="${isEdit?item.unitPrice:0}" step="0.01"></div>

      </select></div>
    </div>

    </div>`);
}

function saveInvItem(id) {
  const item = {
    name: document.getElementById('mi_name').value.trim(),
    category: document.getElementById('mi_cat').value.trim(),
    unit: document.getElementById('mi_unit').value,
    stock: parseFloat(document.getElementById('mi_stock').value)||0,
    minStock: parseFloat(document.getElementById('mi_minstock').value)||0,
    unitPrice: parseFloat(document.getElementById('mi_price').value)||0,
    type: document.getElementById('mi_type').value,
  };
  if (!item.name) return alert('Nome obrigatório.');
  if (id) {
    const idx = state.inventory.findIndex(i=>i.id===id);
    state.inventory[idx] = {...state.inventory[idx], ...item};
    addAudit('Edição', 'Inventário', `Item "${item.name}" atualizado.`);
    sbSaveInventoryItem(state.inventory[idx]);
  } else {
    const newItem = {id:uid(),...item};
    state.inventory.push(newItem);
    addAudit('Criação', 'Inventário', `Item "${item.name}" adicionado.`);
    sbSaveInventoryItem(newItem);
  }
  closeModal(); renderInventario();
}

function openAdjModal(item) {
  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:0.5rem;">Ajuste de Stock</h2>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;">${item.name} · Stock atual: <strong>${parseFloat(item.stock).toFixed(2)} ${item.unit}</strong></p>
    <div style="display:flex;gap:1rem;margin-bottom:1rem;">
      <div style="flex:1;"><label class="label">Tipo</label><select class="input" id="adj_type">
        <option value="+">Entrada (+)</option><option value="-">Saída (-)</option>
      </select></div>
      <div style="flex:1;"><label class="label">Quantidade</label><input class="input" type="number" id="adj_qty" value="1" step="0.01" min="0.01"></div>
    </div>
    <div><label class="label">Motivo</label><input class="input" id="adj_reason" placeholder="Ex: Compra, Descarte..."></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="applyAdj('${item.id}')">Aplicar</button>
    </div>`);
}

function applyAdj(id) {
  const type = document.getElementById('adj_type').value;
  const qty = parseFloat(document.getElementById('adj_qty').value)||0;
  const reason = document.getElementById('adj_reason').value;
  const inv = state.inventory.find(i=>i.id===id);
  if (!inv) return;
  const prev = parseFloat(inv.stock);
  inv.stock = parseFloat((type==='+' ? prev+qty : Math.max(0,prev-qty)).toFixed(3));
  addAudit('Ajuste Stock', 'Inventário', `${inv.name}: ${type}${qty} ${inv.unit}. Motivo: ${reason||'N/A'}. Anterior: ${prev}, Novo: ${inv.stock}`);
  sbSaveInventoryItem(inv);
  closeModal(); renderInventario();
}

function deleteInv(id) {
  if (!confirm('Remover item?')) return;
  const inv = state.inventory.find(i=>i.id===id);
  state.inventory = state.inventory.filter(i=>i.id!==id);
  addAudit('Exclusão', 'Inventário', `Item "${inv?.name}" removido.`);
  sbDeleteInventoryItem(id);
  renderInventario();
}

let recipeIngredients = [];
function openRecipeModal(recipe=null) {
  const isEdit = !!recipe;
  recipeIngredients = isEdit ? JSON.parse(recipe.ingredients||'[]') : [];
  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:1.5rem;">${isEdit?'Editar Receita':'Nova Receita'}</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
      <div style="grid-column:1/-1;"><label class="label">Nome da Receita</label><input class="input" id="rc_name" value="${isEdit?recipe.name:''}"></div>
      <div><label class="label">Tipo</label><select class="input" id="rc_type" onchange="togglePriceField(this.value)">
        <option value="final"${isEdit&&recipe.type==='final'?' selected':''}>Produto Final</option>
        <option value="semi"${isEdit&&recipe.type==='semi'?' selected':''}>Semi-elaborado</option>
      </select></div>
      <div id="rc_price_wrap"><label class="label">Preço de Venda (R$)</label><input class="input" type="number" id="rc_price" value="${isEdit?recipe.salePrice:0}" step="0.01"></div>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:1rem;margin-bottom:1rem;">
      <h3 style="font-weight:700;font-size:0.9rem;margin-bottom:0.75rem;">Ingredientes</h3>
      <div id="rc_ings"></div>
      <div style="display:flex;gap:0.75rem;margin-top:0.75rem;">
        <select class="input" id="rc_ing_item" style="flex:2;">${state.inventory.slice().sort((a,b)=>a.name.localeCompare(b.name,'pt-BR')).map(i=>`<option value="${i.id}">${i.name} (${i.unit})</option>`).join('')}</select>
        <input class="input" type="number" id="rc_ing_qty" placeholder="Qtd" step="0.001" min="0.001" style="flex:1;">
        <select class="input" id="rc_ing_group" style="flex:1;"><option value="base">Base</option><option value="tempero">Tempero</option></select>
        <button class="btn btn-primary btn-sm" onclick="addRecipeIng()">+</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem;">
      <div id="rc_cost_preview" style="font-size:0.85rem;color:var(--muted);">Custo: <span class="mono" style="color:var(--text);font-weight:700;">R$ 0,00</span></div>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveRecipe('${isEdit?recipe.id:''}')">Salvar</button>
      </div>
    </div>`, 'modal-lg');
  renderRecipeIngs();
  togglePriceField(isEdit?recipe.type:'final');
}

function togglePriceField(val) {
  const w = document.getElementById('rc_price_wrap');
  if(w) w.style.display = val==='semi'?'none':'block';
}

function renderRecipeIngs() {
  const container = document.getElementById('rc_ings');
  if (!container) return;
  container.innerHTML = recipeIngredients.map((ing,idx) => {
    const inv = getInvItem(ing.itemId);
    const cost = inv ? parseFloat(ing.qty)*parseFloat(inv.unitPrice) : 0;
    return `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem;background:var(--bg);border-radius:0.75rem;margin-bottom:0.4rem;">
      <span style="flex:2;font-size:0.85rem;font-weight:600;">${inv?.name||'?'} <span class="badge badge-gray" style="margin-left:0.25rem;">${ing.group}</span></span>
      <span class="mono" style="flex:1;font-size:0.85rem;">${ing.qty} ${inv?.unit||''}</span>
      <span class="mono" style="font-size:0.8rem;color:var(--muted);">${fmt(cost)}</span>
      <button class="btn btn-red btn-sm" onclick="removeRecipeIng(${idx})">✕</button>
    </div>`;
  }).join('');
  updateCostPreview();
}

function addRecipeIng() {
  const itemId = document.getElementById('rc_ing_item').value;
  const qty = parseFloat(document.getElementById('rc_ing_qty').value);
  const group = document.getElementById('rc_ing_group').value;
  if (!qty || qty<=0) return alert('Informe a quantidade.');
  recipeIngredients.push({itemId, qty, group});
  document.getElementById('rc_ing_qty').value = '';
  renderRecipeIngs();
}
function removeRecipeIng(idx) { recipeIngredients.splice(idx,1); renderRecipeIngs(); }
function updateCostPreview() {
  let cost = 0;
  recipeIngredients.forEach(ing => {
    const inv = getInvItem(ing.itemId);
    if (inv) cost += parseFloat(ing.qty)*parseFloat(inv.unitPrice);
  });
  const el = document.getElementById('rc_cost_preview');
  if (el) el.innerHTML = `Custo: <span class="mono" style="color:var(--text);font-weight:700;">${fmt(cost)}</span>`;
}

function saveRecipe(id) {
  const name = document.getElementById('rc_name').value.trim();
  const type = document.getElementById('rc_type').value;
  const salePrice = type==='final' ? (parseFloat(document.getElementById('rc_price').value)||0) : 0;
  if (!name) return alert('Nome obrigatório.');
  if (recipeIngredients.length===0) return alert('Adicione ao menos um ingrediente.');
  const rec = {name, type, salePrice, ingredients: JSON.stringify(recipeIngredients)};
  if (id) {
    const idx = state.recipes.findIndex(r=>r.id===id);
    state.recipes[idx] = {...state.recipes[idx],...rec};
    addAudit('Edição','Recetário',`Receita "${name}" atualizada.`);
    sbSaveRecipe(state.recipes[idx]);
  } else {
    const newRec = {id:uid(),...rec};
    state.recipes.push(newRec);
    addAudit('Criação','Recetário',`Receita "${name}" criada.`);
    sbSaveRecipe(newRec);
  }
  closeModal(); renderRecetario();
}

function deleteRecipe(id) {
  if (!confirm('Remover receita?')) return;
  const rec = state.recipes.find(r=>r.id===id);
  state.recipes = state.recipes.filter(r=>r.id!==id);
  addAudit('Exclusão','Recetário',`Receita "${rec?.name}" removida.`);
  sbDeleteRecipe(id);
  renderRecetario();
}

  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:1.5rem;">Registrar Produção</h2>
    <div style="display:grid;gap:1rem;">
      <div><label class="label">Receita</label><select class="input" id="pr_recipe" onchange="checkIngredients()">
        ${finalRecipes.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}
      </select></div>
      <div><label class="label">Quantidade</label><input class="input" type="number" id="pr_qty" value="1" min="1" step="1" oninput="checkIngredients()"></div>
      <div><label class="label">Data de Validade</label><input class="input" type="date" id="pr_expiry" value="${new Date(Date.now()+5*86400000).toISOString().slice(0,10)}"></div>
      <div id="pr_ing_check" style="padding:1rem;background:var(--bg);border-radius:0.75rem;font-size:0.85rem;"></div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmProducao()">✓ Produzir</button>
    </div>`);
  checkIngredients();
}

function checkIngredients() {
  const recipeId = document.getElementById('pr_recipe')?.value;
  const qty = parseFloat(document.getElementById('pr_qty')?.value)||1;
  const recipe = getRecipe(recipeId);
  if (!recipe) return;
  const ings = JSON.parse(recipe.ingredients||'[]');
  let html = '<p style="font-weight:600;margin-bottom:0.5rem;font-size:0.8rem;">Verificação de Stock:</p>';
  let canProduce = true;
  ings.forEach(ing => {
    const inv = getInvItem(ing.itemId);
    const needed = parseFloat(ing.qty)*qty;
    const avail = getEffectiveStock(inv);
    const ok = inv && avail >= needed;
    if (!ok) canProduce = false;
    html += `<div style="display:flex;justify-content:space-between;padding:0.2rem 0;color:${ok?'var(--green)':'var(--red)'};">
      <span>${inv?.name||'?'}${inv?.type==='semi'?' <span style="font-size:0.7rem;opacity:0.7;">(semi)</span>':''}</span>
      <span class="mono">${needed.toFixed(3)} ${inv?.unit||''} (disp: ${avail.toFixed(3)})</span>
    </div>`;
  });
  if (!canProduce) html += '<p style="color:var(--red);font-weight:600;margin-top:0.5rem;">⚠️ Stock insuficiente! Para ingredientes semi-elaborados, produza-os primeiro no módulo de Produção.</p>';
  const el = document.getElementById('pr_ing_check');
  if (el) el.innerHTML = html;
}

function confirmProducao() {
  const recipeId = document.getElementById('pr_recipe').value;
  const qty = parseFloat(document.getElementById('pr_qty').value)||1;
  const expiry = document.getElementById('pr_expiry').value;
  const recipe = getRecipe(recipeId);
  if (!recipe) return;
  const ings = JSON.parse(recipe.ingredients||'[]');
  for (const ing of ings) {
    const inv = getInvItem(ing.itemId);
    if (!inv || getEffectiveStock(inv) < parseFloat(ing.qty)*qty) return alert('Stock insuficiente para produzir!');
  }
  ings.forEach(ing => {
    const inv = getInvItem(ing.itemId);
    consumeStock(inv, parseFloat(ing.qty)*qty);
  });
  const lot = { id: uid(), recipeId, recipeName: recipe.name, qty, remaining: qty, date: new Date().toISOString(), expiresAt: expiry ? new Date(expiry).toISOString() : new Date(Date.now()+5*86400000).toISOString(), status: 'active', producedBy: currentUser.name };
  state.productionLog.unshift(lot);
  // sync inventory stock changes to Supabase
  ings.forEach(ing => { const inv = getInvItem(ing.itemId); if(inv && inv.type!=='semi') sbSaveInventoryItem(inv); });
  sbSaveLot(lot);
  addAudit('Produção', 'Produção', `${qty}x ${recipe.name}. Lote: ${lot.id}`);
  closeModal(); renderProducao();
}

function anularLote(id) {
  if (!confirm('Anular lote? O stock dos ingredientes será devolvido.')) return;
  const lot = state.productionLog.find(l=>l.id===id);
  if (!lot || lot.status!=='active') return;
  const recipe = getRecipe(lot.recipeId);
  if (recipe) {
    const ings = JSON.parse(recipe.ingredients||'[]');
    const qty = parseFloat(lot.remaining);
    ings.forEach(ing => {
      const inv = getInvItem(ing.itemId);
      if (inv) inv.stock = parseFloat((parseFloat(inv.stock)+parseFloat(ing.qty)*qty).toFixed(3));
    });
  }
  lot.status = 'anulado'; lot.remaining = 0;
  addAudit('Anulação', 'Produção', `Lote ${id} anulado. ${lot.recipeName} - ${lot.qty} unid.`);
  sbSaveLot(lot);
  if (recipe) { const ings2 = JSON.parse(recipe.ingredients||'[]'); ings2.forEach(ing => { const inv2 = getInvItem(ing.itemId); if(inv2 && inv2.type!=='semi') sbSaveInventoryItem(inv2); }); }
  saveAll(); renderProducao();
}

function mermaLote(id) {
  const lot = state.productionLog.find(l=>l.id===id);
  if (!lot || lot.status!=='active') return;
  const qty = prompt(`Registrar merma de "${lot.recipeName}". Quantidade (restante: ${lot.remaining}):`);
  if (!qty) return;
  const q = parseFloat(qty);
  if (isNaN(q)||q<=0||q>parseFloat(lot.remaining)) return alert('Quantidade inválida.');
  lot.remaining = parseFloat((parseFloat(lot.remaining)-q).toFixed(3));
  if (lot.remaining<=0) lot.status = 'merma';
  addAudit('Merma', 'Produção', `Lote ${id}: ${q} unid. de "${lot.recipeName}" declaradas como merma.`);
  sbSaveLot(lot);
  saveAll(); renderProducao();
}

let cart = [];
function renderCaixa() {
  const finalRecipes = state.recipes.filter(r=>r.type==='final');
  document.getElementById('pageContent').innerHTML = `
    <div class="section-header"><h1 class="page-title">Caixa (POS)</h1></div>
    <div style="display:grid;grid-template-columns:1fr 380px;gap:1.5rem;height:calc(100vh - 120px);">
      <div style="overflow-y:auto;">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">
          ${finalRecipes.map(r => {
            const stock = getTotalStock(r.id);
            const promo = getActivePromoForProduct(r.id);
            const finalPrice = promo ? applyPromo(parseFloat(r.salePrice), promo, 1, r.id) : parseFloat(r.salePrice);
            return `<div class="pos-item ${stock<=0?'disabled':''}" onclick="addToCart('${r.id}')">
              <div style="font-size:2rem;text-align:center;margin-bottom:0.5rem;">🍕</div>
              <h3 style="font-weight:700;font-size:0.9rem;text-align:center;margin-bottom:0.5rem;">${r.name}</h3>
              <div style="text-align:center;margin-bottom:0.5rem;">
                ${promo && finalPrice < parseFloat(r.salePrice) ? `<span class="strikethrough" style="font-size:0.8rem;">${fmt(r.salePrice)}</span> <span class="promo-price">${fmt(finalPrice)}</span>` : `<span class="mono" style="font-weight:700;color:var(--green);">${fmt(r.salePrice)}</span>`}
              </div>
              <div style="text-align:center;"><span class="badge ${stock>0?'badge-blue':'badge-red'}">${stock.toFixed(1)} disp.</span></div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card" style="padding:1.25rem;display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <h3 style="font-weight:800;font-size:1rem;margin-bottom:1rem;">🛒 Carrinho</h3>
        <div style="flex:1;overflow-y:auto;" id="cartItems"></div>
        <div style="border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;" id="cartSummary"></div>
      </div>
    </div>
  `;
  renderCart();
}

function getActivePromos() {
  const now = new Date();
  return state.promotions.filter(p => p.active && new Date(p.dateFrom)<=now && new Date(p.dateTo)>=now);
}

function getActivePromoForProduct(productId) {
  const promos = getActivePromos();
  const productPromo = promos.find(p => p.type==='product_pct' && p.productId===productId);
  const globalPromo = promos.find(p => p.type==='global_pct');
  return productPromo || globalPromo || null;
}

function applyPromo(basePrice, promo, qty, productId) {
  if (!promo) return basePrice;
  if (promo.type==='global_pct'||promo.type==='product_pct') return basePrice*(1-parseFloat(promo.value)/100);
  if (promo.type==='volume_fixed' && qty>=parseInt(promo.minQty) && promo.productId===productId) return parseFloat(promo.value)/parseInt(promo.minQty);
  if (promo.type==='volume_pct' && qty>=parseInt(promo.minQty) && promo.productId===productId) return basePrice*(1-parseFloat(promo.value)/100);
  return basePrice;
}

function calcCartPromos() {
  const promos = getActivePromos();
  let discount = 0;
  cart.forEach(item => {
    const recipe = getRecipe(item.recipeId);
    if (!recipe) return;
    const base = parseFloat(recipe.salePrice)*item.qty;
    let bestPrice = base;
    promos.forEach(p => {
      if (p.type==='global_pct') { bestPrice = Math.min(bestPrice, base*(1-parseFloat(p.value)/100)); }
      if (p.type==='product_pct' && p.productId===item.recipeId) { bestPrice = Math.min(bestPrice, base*(1-parseFloat(p.value)/100)); }
      if (p.type==='volume_fixed' && p.productId===item.recipeId && item.qty>=parseInt(p.minQty)) { bestPrice = Math.min(bestPrice, parseFloat(p.value)*Math.floor(item.qty/parseInt(p.minQty))+(item.qty%parseInt(p.minQty))*parseFloat(recipe.salePrice)); }
      if (p.type==='volume_pct' && p.productId===item.recipeId && item.qty>=parseInt(p.minQty)) { bestPrice = Math.min(bestPrice, base*(1-parseFloat(p.value)/100)); }
    });
    item._finalLineTotal = bestPrice;
    discount += base - bestPrice;
  });
  return discount;
}

function addToCart(recipeId) {
  const stock = getTotalStock(recipeId);
  const inCart = cart.find(c=>c.recipeId===recipeId);
  const currentQty = inCart ? inCart.qty : 0;
  if (currentQty >= stock) return alert('Stock insuficiente!');
  if (inCart) { inCart.qty++; } else {
    const recipe = getRecipe(recipeId);
    cart.push({recipeId, name: recipe.name, qty: 1, basePrice: parseFloat(recipe.salePrice)});
  }
  renderCart();
}

function removeFromCart(recipeId) {
  const inCart = cart.find(c=>c.recipeId===recipeId);
  if (!inCart) return;
  if (inCart.qty>1) inCart.qty--; else cart = cart.filter(c=>c.recipeId!==recipeId);
  renderCart();
}

function renderCart() {
  const discount = calcCartPromos();
  const subtotal = cart.reduce((s,c)=>s+c.basePrice*c.qty,0);
  const total = subtotal - discount;
  const cartEl = document.getElementById('cartItems');
  const summaryEl = document.getElementById('cartSummary');
  if (!cartEl) return;
  cartEl.innerHTML = cart.length===0 ? '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:2rem 0;">Carrinho vazio</p>' :
    cart.map(item => {
      const lineBase = item.basePrice*item.qty;
      const lineFinal = item._finalLineTotal !== undefined ? item._finalLineTotal : lineBase;
      const hasDiscount = lineFinal < lineBase;
      return `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid var(--border);">
        <div style="flex:1;min-width:0;">
          <p style="font-weight:600;font-size:0.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</p>
          <p style="font-size:0.75rem;color:var(--muted);">${fmt(item.basePrice)} cada</p>
        </div>
        <div style="display:flex;align-items:center;gap:0.25rem;">
          <button class="btn btn-ghost btn-sm" onclick="removeFromCart('${item.recipeId}')" style="padding:0.2rem 0.5rem;">−</button>
          <span style="font-weight:700;min-width:24px;text-align:center;">${item.qty}</span>
          <button class="btn btn-ghost btn-sm" onclick="addToCart('${item.recipeId}')" style="padding:0.2rem 0.5rem;">+</button>
        </div>
        <div style="text-align:right;min-width:70px;">
          ${hasDiscount ? `<div class="strikethrough" style="font-size:0.75rem;">${fmt(lineBase)}</div><div class="promo-price" style="font-size:0.85rem;">${fmt(lineFinal)}</div>` : `<div class="mono" style="font-weight:600;font-size:0.85rem;">${fmt(lineBase)}</div>`}
        </div>
      </div>`;
    }).join('');

  summaryEl.innerHTML = `
    <div style="font-size:0.85rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:0.35rem;"><span>Subtotal</span><span class="mono">${fmt(subtotal)}</span></div>
      ${discount>0?`<div style="display:flex;justify-content:space-between;margin-bottom:0.35rem;color:var(--red);"><span>🏷️ Desconto</span><span class="mono">-${fmt(discount)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800;margin-top:0.5rem;border-top:2px solid var(--border);padding-top:0.5rem;"><span>Total</span><span class="mono" style="color:var(--green);">${fmt(total)}</span></div>
    </div>
    <button class="btn btn-green" style="width:100%;justify-content:center;margin-top:1rem;padding:0.875rem;" onclick="openCheckout()" ${cart.length===0?'disabled':''}>Finalizar Venda →</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:0.5rem;font-size:0.8rem;" onclick="cart=[];renderCart()">Limpar</button>
  `;
}

function openCheckout() {
  const discount = calcCartPromos();
  const subtotal = cart.reduce((s,c)=>s+c.basePrice*c.qty,0);
  const total = subtotal - discount;
  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:1rem;">Finalizar Venda</h2>
    <div style="background:var(--bg);border-radius:1rem;padding:1rem;margin-bottom:1rem;">
      ${cart.map(c=>`<div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:0.25rem;"><span>${c.name} x${c.qty}</span><span class="mono">${fmt(c._finalLineTotal!==undefined?c._finalLineTotal:c.basePrice*c.qty)}</span></div>`).join('')}
      <div style="border-top:1px solid var(--border);margin-top:0.5rem;padding-top:0.5rem;display:flex;justify-content:space-between;font-weight:800;"><span>Total</span><span class="mono" style="color:var(--green);">${fmt(total)}</span></div>
    </div>
    <div><label class="label">Forma de Pagamento</label><select class="input" id="co_payment">
      <option>Dinheiro</option><option>Cartão de Débito</option><option>Cartão de Crédito</option><option>PIX</option>
    </select></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmSale(${subtotal},${discount},${total})">✓ Confirmar Venda</button>
    </div>`);
}

function confirmSale(subtotal, discount, total) {
  const payment = document.getElementById('co_payment').value;
  // FIFO deduction
  cart.forEach(item => {
    let remaining = item.qty;
    const lots = state.productionLog.filter(l=>l.recipeId===item.recipeId&&l.status==='active'&&parseFloat(l.remaining)>0)
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    for (const lot of lots) {
      if (remaining<=0) break;
      const deduct = Math.min(parseFloat(lot.remaining), remaining);
      lot.remaining = parseFloat((parseFloat(lot.remaining)-deduct).toFixed(3));
      remaining -= deduct;
      if (lot.remaining<=0) lot.remaining=0;
    }
  });
  const sale = {
    id: uid(), date: new Date().toISOString(), user: currentUser.name,
    items: JSON.stringify(cart.map(c=>({name:c.name,qty:c.qty,price:c.basePrice}))),
    subtotal, discount, total, payment
  };
  state.salesLog.unshift(sale);
  const cartSnapshot = cart.slice();
  addAudit('Venda', 'Caixa', `Total: ${fmt(total)}. Itens: ${cart.map(c=>`${c.name}x${c.qty}`).join(', ')}`);
  sbSaveSale(sale, cartSnapshot);
  cart = [];
  closeModal(); renderCaixa();
  showToast('Venda registrada com sucesso! ✓');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#10b981;color:white;padding:1rem 1.5rem;border-radius:1rem;font-weight:600;font-size:0.9rem;z-index:9999;box-shadow:0 8px 30px rgba(16,185,129,0.3);animation:fadeIn 0.3s;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

function savePromo(id) {
  const promo = {
    name: document.getElementById('pm_name').value.trim(),
    type: document.getElementById('pm_type').value,
    value: parseFloat(document.getElementById('pm_value').value)||0,
    productId: document.getElementById('pm_product').value,
    minQty: parseInt(document.getElementById('pm_minqty').value)||1,
    dateFrom: new Date(document.getElementById('pm_from').value).toISOString(),
    dateTo: new Date(document.getElementById('pm_to').value).toISOString(),
    active: document.getElementById('pm_active').checked,
  };
  if (!promo.name) return alert('Nome obrigatório.');
  if (id) {
    const idx = state.promotions.findIndex(p=>p.id===id);
    state.promotions[idx] = {...state.promotions[idx],...promo};
    addAudit('Edição','Promoções',`Promoção "${promo.name}" atualizada.`);
    sbSavePromo(state.promotions[idx]);
  } else {
    const newPromo = {id:uid(),...promo};
    state.promotions.push(newPromo);
    addAudit('Criação','Promoções',`Promoção "${promo.name}" criada.`);
    sbSavePromo(newPromo);
  }
  closeModal(); renderPromocoes();
}

function deletePromo(id) {
  if (!confirm('Remover promoção?')) return;
  const p = state.promotions.find(x=>x.id===id);
  state.promotions = state.promotions.filter(x=>x.id!==id);
  addAudit('Exclusão','Promoções',`Promoção "${p?.name}" removida.`);
  sbDeletePromo(id);
  renderPromocoes();
}

// ======================= USUÁRIOS =======================
function renderUsuarios() {
  document.getElementById('pageContent').innerHTML = `
    <div class="section-header">
      <h1 class="page-title">Usuários</h1>
      <button class="btn btn-primary" onclick="openUserModal()">+ Novo Usuário</button>
    </div>
    <div class="card" style="padding:1.5rem;max-width:700px;">
      <table style="width:100%;">
        <thead><tr><th class="th">Nome</th><th class="th">PIN</th><th class="th">Papel</th><th class="th">Ações</th></tr></thead>
        <tbody>
        ${state.users.map(u => `<tr>
          <td class="td"><div style="display:flex;align-items:center;gap:0.75rem;">
            <div style="width:32px;height:32px;border-radius:0.625rem;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85rem;">${u.name[0]}</div>
            <span style="font-weight:600;">${u.name}</span>
          </div></td>
          <td class="td"><span class="mono badge badge-gray">****</span></td>
          <td class="td"><span class="badge badge-blue">${u.role}</span></td>
          <td class="td" style="display:flex;gap:0.5rem;">
            <button class="btn btn-ghost btn-sm" onclick='openUserModal(${JSON.stringify(u).replace(/'/g,"&apos;")})'>✏️</button>
            <button class="btn btn-red btn-sm" onclick="deleteUser('${u.id}')">🗑</button>
          </td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function openUserModal(user=null) {
  const isEdit = !!user;
  showModal(`<h2 style="font-weight:800;font-size:1.2rem;margin-bottom:1.5rem;">${isEdit?'Editar Usuário':'Novo Usuário'}</h2>
    <div style="display:grid;gap:1rem;">
      <div><label class="label">Nome</label><input class="input" id="usr_name" value="${isEdit?user.name:''}"></div>
      <div><label class="label">PIN (4 dígitos)</label><input class="input" type="password" id="usr_pin" maxlength="4" value="${isEdit?user.pin:''}" placeholder="••••"></div>
      <div><label class="label">Papel</label><select class="input" id="usr_role">
        <option value="admin"${isEdit&&user.role==='admin'?' selected':''}>Admin</option>
        <option value="cocina"${isEdit&&user.role==='cocina'?' selected':''}>Cozinha</option>
        <option value="caixa"${isEdit&&user.role==='caixa'?' selected':''}>Caixa</option>
      </select></div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser('${isEdit?user.id:''}')">Salvar</button>
    </div>`);
}

function saveUser(id) {
  const name = document.getElementById('usr_name').value.trim();
  const pin = document.getElementById('usr_pin').value.trim();
  const role = document.getElementById('usr_role').value;
  if (!name) return alert('Nome obrigatório.');
  if (!/^\d{4}$/.test(pin)) return alert('PIN deve ter 4 dígitos.');
  if (state.users.some(u=>u.pin===pin&&u.id!==id)) return alert('PIN já existe.');
  if (id) {
    const idx = state.users.findIndex(u=>u.id===id);
    state.users[idx] = {...state.users[idx],name,pin,role};
    addAudit('Edição','Usuários',`Usuário "${name}" atualizado.`);
    sbSaveUser(state.users[idx]);
  } else {
    const newUser = {id:uid(),name,pin,role};
    state.users.push(newUser);
    addAudit('Criação','Usuários',`Usuário "${name}" (${role}) criado.`);
    sbSaveUser(newUser);
  }
  closeModal(); renderUsuarios();
}

function deleteUser(id) {
  if (id===currentUser?.id) return alert('Não é possível remover o usuário atual.');
  if (!confirm('Remover usuário?')) return;
  const u = state.users.find(x=>x.id===id);
  state.users = state.users.filter(x=>x.id!==id);
  addAudit('Exclusão','Usuários',`Usuário "${u?.name}" removido.`);
  sbDeleteUser(id);
  renderUsuarios();
}

// ======================= MODAL =======================
function showModal(html, extraClass='') {
  document.getElementById('modalContent').className = 'modal ' + extraClass;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
// Modal overlay: close only on true click (not drag)
let _modalMouseDownTarget = null;
document.addEventListener('mousedown', e => { _modalMouseDownTarget = e.target; });
document.addEventListener('mouseup', e => {
  const overlay = document.getElementById('modalOverlay');
  if (!overlay || overlay.style.display === 'none') return;
  // Only close if BOTH mousedown AND mouseup landed on the overlay itself (no drag)
  if (_modalMouseDownTarget === overlay && e.target === overlay) closeModal();
  _modalMouseDownTarget = null;
});

// ======================= KEYBOARD =======================
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (document.getElementById('loginStep2').style.display!=='none' && /^\d$/.test(e.key)) pinPress(parseInt(e.key));
  if (e.key==='Backspace' && document.getElementById('loginStep2').style.display!=='none') pinPress('del');
});
</script>
